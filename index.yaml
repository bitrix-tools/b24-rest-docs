blocks:
  - type: 'header-block'
    width: 's'
    offset: 'default'
    title: 'Bitrix24 REST API'
    resetPaddings: false
    verticalOffset: 'l'
    description: 'Инструмент для создания интеграций, автоматизаций рабочих процессов и кастомизации пользовательских сценариев Битрикс24'
    background:
      light:
        image:
          mobile: '_images/cover.png'
          desktop: '_images/cover.png'
          disableCompress: true
        color: '#E8E4FF'
        fullWidth: false
      dark:
        image:
          mobile: '_images/img_restapi_main.png'
          desktop: '_images/img_restapi_main.png'
          disableCompress: true
        color: '#E8E4FF'
        fullWidth: false
    buttons:
      - text: 'Начать'
        theme: 'outlined'
        size: 'promo'
        url: '/first-steps/index.html'
      - text: 'GitHub'
        theme: 'outlined'
        size: 'promo'
        url: 'https://github.com/bitrix-tools/bitrix24-dev-hub'
      - text: 'Вайбкод'
        theme: 'outlined'
        size: 'promo'
        url: 'https://vibecode.bitrix24.tech/'

  - type: 'extended-features-block'
    title:
      text: 'Быстрый старт'
    items:
      - title: 'С чего начать знакомство'
        icon: '_images/img_restapi_icon_01.svg'
        text: 'Узнайте, как устроена документация и как использовать API'
        buttons:
          - text: 'Узнать'
            theme: 'outlined'
            size: 'promo'
            url: '/first-steps/index.html'
      - title: 'Как получить доступ'
        icon: '_images/img_restapi_icon_02.svg'
        text: 'Ознакомьтесь с требованиями к тарифу Битрикс24 и начните знакомство с разделом для разработчиков внутри продукта'
        buttons:
          - text: 'Ознакомиться'
            theme: 'outlined'
            size: 'promo'
            url: '/first-steps/access-to-rest-api.html'
      - title: 'Как выполнить запрос'
        icon: '_images/img_restapi_icon_03.svg'
        text: 'Получите практическую инструкцию для вашего первого вызова REST API Битрикс24'
        buttons:
          - text: 'Попробовать'
            theme: 'outlined'
            size: 'promo'
            url: '/first-steps/first-rest-api-call.html'

  - type: 'content-layout-block'
    textContent:
      title: 'Битрикс24 Вайбкод'
      text: |
        Битрикс24 Вайбкод помогает создавать приложения для Битрикс24 с помощью AI-агентов: Codex, Claude Code, Cursor и других инструментов. Вайбкод передает агенту документацию, права доступа и данные для запуска приложения.
        - Получите ключ Вайбкод
        - Передайте ключ AI-агенту
        - Опишите задачу на естественном языке
        - Получите готовое приложение для Битрикс24
      links:
        - text: 'Как работать с платформой Вайбкод'
          theme: 'normal'
          url: '/ai-tools/vibecode.html'
          arrow: true
        - text: 'Открыть Битрикс24 Вайбкод'
          theme: 'normal'
          url: 'https://vibecode.bitrix24.tech/'
          arrow: true

  - type: 'card-layout-block'
    title: 'Как устроен REST API'
    colSizes:
      all: 12
      md: 4
      sm: 6
    children:
      - type: 'image-card'
        title: 'Версии API'
        text: 'В Битрикс24 используются две версии REST API: REST и REST 3.0. Они различаются путем вызова, форматом некоторых ответов и составом документации. Перед началом работы уточните, какая версия REST используется в вашем сценарии.'
        links:
          - text: 'Сравнение версий REST'
            theme: 'normal'
            url: '/api-reference/rest-v3/index.html'
        image:
          dark: "_images/api_version.png"
          light: "_images/api_version.png"

      - type: 'image-card'
        title: 'Именование методов'
        text: 'Название метода часто помогает понять область API и тип операции. Но одного имени метода недостаточно, чтобы точно определить его поведение, параметры и ограничения. Используйте название как ориентир, а подробности проверяйте в справочнике API.'
        links:
          - text: 'Справочник API'
            theme: 'normal'
            url: '/api-reference/index.html'
        image:
          dark: "_images/name_methods.png"
          light: "_images/name_methods.png"

      - type: 'image-card'
        title: 'Ответ метода'
        text: 'Методы REST API возвращают ответ в JSON. Структура успешного ответа и формат ошибки зависят от версии REST и конкретного метода. Точные поля ответа смотрите в описании нужного метода.'
        links:
          - text: 'Коды ошибок'
            theme: 'normal'
            url: '/error-codes.html'
        image:
          dark: "_images/response_method.png"
          light: "_images/response_method.png"

  - type: 'card-layout-block'
    title: 'Какой сценарий интеграции выбрать'
    description: 'В Битрикс24 можно использовать webhook и разные типы приложений. Сначала определите, нужен ли вам webhook или приложение, затем выберите подходящий сценарий по архитектуре и интерфейсу.'
    colSizes:
      all: 12
      md: 6
      sm: 6
    children:
      - type: 'layout-item'
        content:
          title: 'Быстрые вызовы отдельных методов без разработки приложения'
          text: 'Подходит для простых сценариев, когда нужно быстро обратиться к отдельным методам без серверной логики приложения и пользовательского интерфейса в слайдере.'
          links:
            - text: 'Webhook'
              theme: 'normal'
              url: '/local-integrations/local-webhooks.html'
        media:
          dark:
            image: '_images/fast-api.png'
          light:
            image: '_images/fast-api.png'

      - type: 'layout-item'
        content:
          title: 'Статичная страница внутри Битрикс24 без серверной логики'
          text: 'Подходит для простых локальных приложений, которые открываются внутри портала, не выполняют серверную логику и не отправляют запросы на внешний сервер.'
          links:
            - text: 'Локальное приложение'
              theme: 'normal'
              url: '/local-integrations/local-apps.html'
        media:
          dark:
            image: '_images/static_page.png'
          light:
            image: '_images/static_page.png'

      - type: 'layout-item'
        content:
          title: 'Серверная логика с интерфейсом в слайдере'
          text: 'Подходит и для локальных, и для тиражных приложений. Выбор зависит от того, нужно ли решение только для одного портала или для публикации в Маркетплейсе.'
          links:
            - text: 'Локальное приложение'
              theme: 'normal'
              url: '/local-integrations/local-apps.html'
            - text: 'Приложение Маркетплейса'
              theme: 'normal'
              url: '/market/index.html'
        media:
          dark:
            image: '_images/server_logic.png'
          light:
            image: '_images/server_logic.png'

      - type: 'layout-item'
        content:
          title: 'Серверная логика без интерфейса'
          text: 'Подходит и для локальных, и для тиражных приложений. Такой сценарий используется, когда приложение работает в фоне и пользователь не открывает его в слайдере.'
          links:
            - text: 'Локальное приложение'
              theme: 'normal'
              url: '/local-integrations/local-apps.html'
            - text: 'Приложение Маркетплейса'
              theme: 'normal'
              url: '/market/index.html'
        media:
          dark:
            image: '_images/server_logic_2.png'
          light:
            image: '_images/server_logic_2.png'


  - dots: true
    type: 'slider-block'
    title:
      text: 'Популярные разделы API'
    description: 'Краткий список разделов, с которых чаще всего начинают работу. Полный список возможностей смотрите в <a href="/api-reference/index.html">справочнике API</a>.'
    children:
      - type: 'basic-card'
        title: 'CRM'
        text: 'Лиды, сделки, контакты, компании, смарт-процессы'
        buttons:
          - text: 'CRM: API-методы'
            theme: 'outlined'
            size: 'promo'
            url: '/api-reference/crm/index.html'
        icon: "_images/crm_icon.png"

      - type: 'basic-card'
        title: 'Задачи'
        text: 'Задачи, чеклисты, комментарии, стадии и потоки'
        buttons:
          - text: 'Задачи: API-методы'
            theme: 'outlined'
            size: 'promo'
            url: '/api-reference/tasks/index.html'
        icon: "_images/task_icon.png"

      - type: 'basic-card'
        title: 'Чаты'
        text: 'Чаты, сообщения, уведомления, операции с диалогами'
        buttons:
          - text: 'Чаты: API-методы'
            theme: 'outlined'
            size: 'promo'
            url: '/api-reference/chats/index.html'
        icon: "_images/chat_icon.png"

      - type: 'basic-card'
        title: 'Каталог'
        text: 'Товары, цены, разделы, свойства, остатки'
        buttons:
          - text: 'Каталог: API-методы'
            theme: 'outlined'
            size: 'promo'
            url: '/api-reference/catalog/index.html'
        icon: "_images/catalog_icon.png"

      - type: 'basic-card'
        title: 'Пользователи'
        text: 'Пользователи, структура компании, пользовательские поля'
        buttons:
          - text: 'Пользователи: API-методы'
            theme: 'outlined'
            size: 'promo'
            url: '/api-reference/user/index.html'
        icon: "_images/users_icon.png"

      - type: 'basic-card'
        title: 'Календарь'
        text: 'События, календари, ресурсы и бронирование'
        buttons:
          - text: 'Календарь: API-методы'
            theme: 'outlined'
            size: 'promo'
            url: '/api-reference/calendar/index.html'
        icon: "_images/calendar_icon.png"

    arrows: false


  - type: 'card-layout-block'
    title: 'Ключевые концепции'
    colSizes:
      all: 12
      md: 4
      sm: 6
    children:
      - type: 'image-card'
        title: 'Scope'
        text: 'Для вызова метода нужны соответствующие права доступа. Набор прав зависит от сценария интеграции и конкретного метода. Проверяйте требования на странице метода и в описании scope.'
        margins: 'm'
        links:
          - text: 'Права доступа'
            theme: 'normal'
            url: '/api-reference/scopes/index.html'
        image:
          dark: '_images/scope.png'
          light: '_images/scope.png'

      - type: 'image-card'
        title: 'Лимиты'
        text: 'В Битрикс24 действуют лимиты на интенсивность запросов и ресурсоемкость методов. Перед массовыми вызовами проверьте ограничения и рекомендации по снижению нагрузки.'
        margins: 'm'
        links:
          - text: 'Лимиты REST API'
            theme: 'normal'
            url: '/limits.html'
        image:
          dark: '_images/limits.png'
          light: '_images/limits.png'

      - type: 'image-card'
        title: 'Batch'
        text: 'Метод batch позволяет объединить несколько вызовов в один запрос и снизить нагрузку на лимиты.'
        margins: 'm'
        links:
          - text: 'Как использовать batch'
            theme: 'normal'
            url: '/settings/how-to-call-rest-api/batch.html'
        image:
          dark: '_images/batch.png'
          light: '_images/batch.png'

      - type: 'image-card'
        title: 'Пагинация'
        text: 'Многие методы списка возвращают данные частями. Способ постраничного получения результатов и параметры пагинации зависят от метода и версии REST. Проверяйте детали в описании конкретного метода.'
        margins: 'm'
        links:
          - text: 'Особенности списочных методов'
            theme: 'normal'
            url: '/settings/how-to-call-rest-api/list-methods-pecularities.html'
        image:
          dark: '_images/pag.png'
          light: '_images/pag.png'

      - type: 'image-card'
        title: 'Файлы'
        text: 'В Битрикс24 используются разные сценарии работы с файловыми полями. Способ передачи файла зависит от типа поля и метода. Перед загрузкой, обновлением или удалением файла проверьте, какой сценарий поддерживает нужный вам метод.'
        margins: 'm'
        links:
          - text: 'Как загрузить файлы'
            theme: 'normal'
            url: '/api-reference/files/how-to-upload-files.html'
          - text: 'Как обновить и удалить файлы'
            theme: 'normal'
            url: '/api-reference/files/how-to-update-files.html'
        image:
          dark: '_images/file.png'
          light: '_images/file.png'

  - type: 'card-layout-block'
    title: 'Частые кейсы и сценарии'
    description: Если вам нужен готовый сценарий для практической задачи, начните с раздела <a href="/tutorials/index.html">Частые кейсы и сценарии</a>. Здесь собраны примеры интеграций и типовые задачи. Для точных параметров и ограничений используйте страницы конкретных методов в справочнике API.
    colSizes:
      all: 12
      md: 4
      sm: 6
    children:
      - type: 'layout-item'
        content:
          title: '<a href="/tutorials/crm/index.html">CRM</a>'
          text: 'Как быстро связать форму на своем сайте с CRM? Как автоматически создавать сделки с товарными позициями? Как, создавая лид из своего источника, «прокинуть» в Битрикс информацию для сквозной аналитики?'
        media:
          image: '_images/img_restapi_banner_s_01.png'
          disableCompress: true
        fullScreen: true
        border: true
        disableCompress: true
      - type: 'layout-item'
        content:
          title: '<a href="/tutorials/sale/index.html">Онлайн-продажи</a>'
          text: 'Как быстро сформировать заказ интернет-магазина? Как получить ссылку на оплату для передачи клиенту? Как подключить свою онлайн-кассу?'
        media:
          image: '_images/img_restapi_banner_s_02.png'
          disableCompress: true
        fullScreen: true
        border: true
        disableCompress: true
      - type: 'layout-item'
        content:
          title: '<a href="/tutorials/index.html">Еще много всего</a>'
          text: 'Импортировать данные, интегрировать свою телефонию, использовать товарный каталог — десятки готовых практических примеров.'
        media:
          image: '_images/img_restapi_banner_s_03.png'
          disableCompress: true
        fullScreen: true
        border: true
        disableCompress: true
        links:
          - text: 'Найти пример'
            theme: 'normal'
            url: '/tutorials/index.html'

  - type: 'filter-block'
    centered: true
    title:
      text: 'Узнайте подробности'
    tags:
      - id: 'one'
        label: 'Локальные интеграции'
      - id: 'two'
        label: 'Битрикс24 Маркетплейс'
      - id: 'three'
        label: 'Справочник API'
      - id: 'four'
        label: 'Библиотеки для разработки'
    colSizes:
      all: 12
      xl: 12
      md: 12
      sm: 12
    items:
      - tags:
          - 'one'
        card:
          type: 'layout-item'
          media:
            image: '_images/local-integrations.jpg'
            disableCompress: true
          border: true
          content:
            links:
              - text: 'Посмотреть документацию'
                url: './local-integrations/'
                theme: 'normal'
                arrow: true
                color: #54BA7E

      - tags:
          - 'two'
        card:
          type: 'layout-item'
          media:
            image: '_images/market.png'
            disableCompress: true
          border: true
          content:
            links:
              - text: 'Посмотреть документацию'
                url: 'market'
                theme: 'normal'
                arrow: true
                color: #54BA7E
      - tags:
          - 'three'
        card:
          type: 'layout-item'
          media:
            image: '_images/api-reference.png'
            disableCompress: true
          border: true
          content:
            links:
              - text: 'Посмотреть документацию'
                url: 'api-reference'
                theme: 'normal'
                arrow: true
                color: #54BA7E
      - tags:
          - 'four'
        card:
          type: 'layout-item'
          media:
            image: '_images/sdk.jpg'
            disableCompress: true
          border: true
          content:
            links:
              - text: 'Посмотреть документацию'
                url: 'sdk'
                theme: 'normal'
                arrow: true
                color: #54BA7E

  - type: 'card-layout-block'
    title: 'Комьюнити и коммуникация с Битрикс24'
    children:
      - type: 'background-card'
        title: 'Улучшить документацию'
        text: 'Мы выложили исходный код документации в открытый доступ. Вы можете помочь нам стать лучше.'
        background:
          src: '_images/img_restapi_banner_l_01.png'
          disableCompress: true
        paddingBottom: 'm'
        buttons:
          - text: 'Подробности'
            theme: 'raised'
            url: 'change-article.html'
        border: none
        theme: 'light'
      - type: 'background-card'
        title: 'Общаться с коллегами'
        text: 'Если не нашли ответ в официальной документации, присоединяйтесь к комьюнити разработчиков — это лучшая среда для обмена опытом.'
        background:
          src: '_images/img_restapi_banner_l_02.png'
          disableCompress: true
        paddingBottom: 'm'
        buttons:
          - text: 'Подробности'
            theme: 'raised'
            url: 'support.html'
        border: none
        theme: 'light'
      - type: 'background-card'
        title: 'Связаться с поддержкой'
        text: 'Наша техническая поддержка помогает решать проблемы партнерам и клиентам. Мы всегда открыты к диалогу.'
        background:
          src: '_images/img_restapi_banner_l_03.png'
          disableCompress: true
        paddingBottom: 'm'
        buttons:
          - text: 'Подробности'
            theme: 'raised'
            url: 'support.html'
        theme: 'light'
        border: none

  - type: 'icons-block'
    size: 'm'
    title: 'Присоединяйтесь к нам'
    items:
      - src: '_images/telegram.svg'
        text: 'Битрикс24.Маркет Live!'
        url: 'https://t.me/b24marketlive'
